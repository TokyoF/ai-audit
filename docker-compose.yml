services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aiaudit-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aiaudit
      POSTGRES_PASSWORD: aiaudit
      POSTGRES_DB: aiaudit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiaudit -d aiaudit"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiaudit-network

  ollama:
    image: ollama/ollama
    container_name: aiaudit-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - aiaudit-network
    restart: unless-stopped


  tools:
    build:
      context: ./tools
      dockerfile: Dockerfile
    container_name: aiaudit-tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aiaudit-network
    restart: unless-stopped

  aiaudit-target:
    build: ./vulnerable-target
    container_name: aiaudit-target
    networks:
      - aiaudit-network
    ports:
      - "8080:80"
      - "2222:22"
      - "2121:21"
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_models:

networks:
  aiaudit-network:
    driver: bridge
